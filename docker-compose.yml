# GrabaKar — Docker Compose Orquestador
# Levanta todo el stack de desarrollo: backend + frontend + PostgreSQL + Redis + Celery
#
# Uso:
#   1. Ejecutar scripts/setup.sh para clonar los repos
#   2. Copiar .env.example a .env
#   3. docker compose up -d

services:
  # --- Backend (Django + DRF) ---
  backend:
    build:
      context: ./repos/grabakar-backend
      dockerfile: Dockerfile
      target: runtime
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload"
    volumes:
      - ./repos/grabakar-backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # --- Celery Worker ---
  celery:
    build:
      context: ./repos/grabakar-backend
      dockerfile: Dockerfile
      target: runtime
    command: celery -A config worker -l info
    volumes:
      - ./repos/grabakar-backend:/app
    env_file: .env
    depends_on:
      - backend
      - redis

  # --- Celery Beat (scheduler) ---
  celery-beat:
    build:
      context: ./repos/grabakar-backend
      dockerfile: Dockerfile
      target: runtime
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./repos/grabakar-backend:/app
    env_file: .env
    depends_on:
      - backend
      - redis

  # --- Frontend (React/Vite dev server) ---
  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./repos/grabakar-frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-grabakar}
      POSTGRES_USER: ${DB_USER:-grabakar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-grabakar_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-grabakar}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
  frontend_node_modules:
